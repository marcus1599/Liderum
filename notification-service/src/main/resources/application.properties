spring.application.name=liderum-notification-service
server.port=${PORT:8081}

spring.rabbitmq.addresses=${CLOUDAMQP_URL:${RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}}

liderum.rabbitmq.exchange=${LIDERUM_RABBITMQ_EXCHANGE:liderum.events}
liderum.rabbitmq.guild-event-created-routing-key=${LIDERUM_RABBITMQ_GUILD_EVENT_CREATED_ROUTING_KEY:guild.event.created}
liderum.rabbitmq.guild-event-created-queue=${LIDERUM_RABBITMQ_GUILD_EVENT_CREATED_QUEUE:notification.guild-event-created}

notification.channels.enabled=${NOTIFICATION_CHANNELS_ENABLED:audit}
notification.discord.webhook-url=${DISCORD_WEBHOOK_URL:}
notification.discord.username=${DISCORD_WEBHOOK_USERNAME:Liderum}
